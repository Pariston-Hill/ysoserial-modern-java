name: Publish release jar

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "v0.0.6-modern-java.1"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build all-in-one jar
        run: mvn -B clean package -DskipTests

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_ASSET: target/ysoserial-0.0.6-SNAPSHOT-all.jar
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          Modern Java-compatible ysoserial build.

          This release provides an all-in-one jar built from this fork, with
          compatibility updates for newer Java runtimes such as Java 17, Java 21,
          and Java 25.

          See README.md for usage, scope, safety notes, and legacy JDK limitations.
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$RELEASE_ASSET" --clobber
          else
            gh release create "$RELEASE_TAG" "$RELEASE_ASSET" \
              --title "ysoserial modern Java build $RELEASE_TAG" \
              --notes-file release-notes.md
          fi
